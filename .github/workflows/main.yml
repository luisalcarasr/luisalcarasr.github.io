name: main 
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node 14.x
        uses: actions/setup-node@v3
        with:
          cache: 'npm'
          node-version: '14'
      - name: Install Dependencies
        run: npm install

  build:
    runs-on: ubuntu-latest
    needs: [dependencies]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node 14.x
        uses: actions/setup-node@v3
        with:
          node-version: '14'
      - name: Cache 
        run: npm ci
      - name: Build
        run: npm run export